<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Exam Table</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
      .container { max-width: 800px; width: 100%; }
      table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
      caption { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; padding: 16px; text-align: left; background: #fff; }
      th { background: #1a1a2e; color: #fff; padding: 14px 12px; text-align: left; font-weight: 600; }
      td { padding: 12px; border-bottom: 1px solid #e8e8e8; color: #333; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #f5f5ff; }
    </style>
  </head>
  <body>
    <div class="container">
      <table>
        <caption>Calculus Final Exam Grades</caption>
        <thead>
          <tr>
            <th>Student</th>
            <th>Score</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Alice Johnson</td>
            <td>95</td>
            <td>A</td>
          </tr>
          <tr>
            <td>Bob Smith</td>
            <td>88</td>
            <td>B+</td>
          </tr>
          <tr>
            <td>Carlos Rivera</td>
            <td>76</td>
            <td>C+</td>
          </tr>
          <tr>
            <td>Diana Lee</td>
            <td>92</td>
            <td>A-</td>
          </tr>
          <tr>
            <td>Ethan Brown</td>
            <td>64</td>
            <td>D</td>
          </tr>
          <tr>
            <td>Fiona Chen</td>
            <td>81</td>
            <td>B</td>
          </tr>
          <tr>
            <td>George Patel</td>
            <td>98</td>
            <td>A+</td>
          </tr>
          <tr>
            <td>Hannah Kim</td>
            <td>70</td>
            <td>C</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
